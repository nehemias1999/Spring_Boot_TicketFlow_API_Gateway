server:
  port: 0

spring:
  application:
    name: event-service

  datasource:
    url: jdbc:mysql://localhost:3306/ticketflow_events?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# ─── Eureka Client Configuration ───────────────────────────────
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ─── Actuator Configuration ────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# ─── Application Info (exposed via /actuator/info) ─────────────
info:
  app:
    name: ${spring.application.name}
    description: Event catalog microservice for the TicketFlow Ticket Reservation System
    version: 0.0.1-SNAPSHOT
