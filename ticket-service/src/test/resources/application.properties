# -------------------------------------------------------
# Test configuration — overrides production settings
# to avoid connecting to external services (MySQL,
# Config Server, Eureka) during unit/integration tests.
# -------------------------------------------------------

# Disable Spring Cloud Config Server connection
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Disable Eureka service discovery
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# In-memory H2 database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — auto-create schema from entities
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests (H2 uses create-drop instead)
spring.flyway.enabled=false
